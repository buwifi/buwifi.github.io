{% assign posts_in_category = site.categories[page.name] %}
{% if posts_in_category %}
  {% for post in posts_in_category %}
    <div class="col-12">
      <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt }}</p>
    </div>
  {% endfor %}
{% else %}
  <p>No posts found in this category.</p>
{% endif %}
