aboutus:
    smallheader: Who we are
    header: We are leveling the data gap between online and offline worlds and allowing stores to create multi-channel experience
    text1:
          Companies must make use of little data techniques to create competitive advantage. 
          Mining little data doesn’t mean investing in expensive data acquisition, hardware, software, or technology infrastructure. 
          Fact-based decision making is an important source of competitive advantage for market-leading companies. 
          So companies need to make commitment, some experimentation and use technology to generate richer data.
    text2:
          BuWiFi creates solutions for retailers to help them better understand their customers and engage better and more efficiently. 
          Offline retailers often envy webshop owners for their easy-to-use online analytic tools and detailed information about every click their customers take. 
          Now offline retailers have same online analytic tools as webshop owners.
    image: img/demos/it-services/about-us/omnichannel-retailing.jpg

ourstory:
    image: images/company/sad-status-1691593_1920-2.jpg
    slogan: Our Story
    header: 
        - <span class="text-primary fw-bold">BuWiFi</span> is a technology company helping public facing enterprises to make more informed business decisions and increase sales through the power of big data analytics.
        - Our goal is to help brick-and-mortar retailers to build relationships with their visitors and create the best possible in-store customer experience.
        # - We bring together the online and offline worlds, creating an integrated user experience that enable brick and mortar retailers to engage with mobile customers along their purchase path.
        # - We provide online analytics for the offline world that helps marketers measure offline ROI and create smarter promotions.
        - Our solution, <span class="text-primary fw-bold">BuWiFi</span>, is an advanced In-store Analytics, Guest WiFi and Marketing Automation platform. 
          With BuWiFi, our clients understand customer traffic patterns and behavior inside and outside their physical stores and target their audiences across all digital channels, to create high impact campaigns with measurable ROI. 
          BuWiFi leads to more effective marketing, new revenue opportunities, better customer satisfaction and improved operational efficiency.
        - BuWiFi founded in 2014 and headquartered in Istanbul, Turkey.
    sentences:
        - Deliver a new guest WiFi experience that creates <span class="text-primary fw-bold">value</span> for all stakeholders, in compliance with privacy regulations
        - Make it beautiful, branded and seamless for your customers to login anytime, at any of your venues.
        - Meet BuWiFi, Cloud-based enterprise guest WiFi solution with analytics and marketing capabilities.
        - Your customers expect fast, free and user-friendly guest WiFi wherever they go. 
          Enhance customer experience with branded login; customised, location-specific content and seamless WiFi login every time, at any of your venues.
          BuWiFi overlays on your existing WiFi infrastructure and can be set up in minutes.
        - Customize every step of your visitors’ experience for maximum customer satisfaction. 
          Build simple, branded splash pages, collect customer profile data, display targeted advertising and more!
    block:
