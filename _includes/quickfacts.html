<section class="section bg-light">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 order-2 order-md-1 mt-4 mt-sm-0 pt-2 pt-sm-0">
                <div class="section-title me-lg-5">

                    <h4 class="title mb-4">{{ site.data.master.quickfacts.title }}</h4>
                    <p class="text-muted">{{ site.data.master.quickfacts.text }}</p>
                    <!-- <a href="javascript:void(0)" class="btn btn-outline-primary">Start Now <i class="uil uil-angle-right-b"></i></a> -->

                </div>
            </div>

            <div class="col-md-6 order-1 order-md-2">
                <img src="{{ site.data.master.quickfacts.image }}" class="img-fluid" alt="">
            </div>
        </div>
    </div>

    <div class="container mt-100 mt-60">

        <div class="row justify-content-center" id="counter">


            {% for item in site.data.master.quickfacts.facts %}

            <div class="col-md-4 mt-4 pt-2">
                <div class="counter-box text-center px-lg-4">
                    <h2 class="mb-0 text-primary display-4">{{ item.fact }}</h2>
                    <h5 class="counter-head">{{ item.slogan }}</h5>
                    <p class="text-muted mb-0">{{ item.text }}</p>
                </div>
            </div>

            {% endfor %}

        </div>
    </div>
</section>
