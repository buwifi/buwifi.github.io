<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta itemprop="description" name="description" content="{% if page.description %}{{ page.description | truncate: 160 }}{% else %}{{ site.description | truncate: 160  }}{% endif %}" />
<link rel="alternate" type="application/atom+xml" title="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" href="{{ '/feed.xml' | absolute_url }}">

<meta name="keywords" content="{{ site.keywords }}" />
<meta name="author" content="{{ site.name }}" />
<meta name="email" content="{{ site.email }}" />
<meta name="website" content="{{ site.web }}" />
<meta name="Version" content="v1.0.0" />

<meta property="og:locale" content="en_US" />
<meta property="og:type" content="article" />
<meta property="og:site_name" content="{{ site.name }}" />
<meta property="og:title" content="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:url" content="{{ page.url  | absolute_url }}" />
<meta property="og:image" content="{%if page.heroimage %}{{ page.heroimage | absolute_url }}{% else %}{{ site.og_image | absolute_url }}{% endif %}" />
<meta property="og:image:width" content="820" />
<meta property="og:image:height" content="460" />
<!-- <meta property="og:image:type" content="image/jpeg" /> -->
<meta property="article:publisher" content="{{ site.name }}" />
<meta property="article:author" content="{{ site.author }}" />
<meta property="article:published_time" content="{{ page.date }}" />
<meta property="article:published_time" content="{{ post.date | date_to_xmlschema }}" />
<meta property="article:modified_time" content="{{ post.date | date_to_xmlschema }}" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="twitter:image" content="{%if page.heroimage %}{{ page.heroimage | absolute_url }}{% else %}{{ site.og_image | absolute_url }}{% endif %}"/>
<meta name="twitter:site" content="@{{ site.twitter_username }}" />
<meta name="twitter:domain" content="{{ site.url }}"/>
<meta name="twitter:creator" content="@{{ site.twitter_username }}">
