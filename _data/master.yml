jobs:
  opening: Python Developer & WiFi Radius/AAA Engineer
  summary: We are looking Python Developer & WiFi Radius/AAA Engineer to take role in company's WiFi based in-store analytics and marketing automation platform and WiFi/AAA Applications.
  qualifications:
   - BS/MS degree in computer engineering/programming or related fields
   - 4+ years of experience building end-to-end web applications using Python
   - Experience in developing web application based on Django framework and third parties APIs
   - Hands on experience with Web Applications and programming languages such as JavaScript, JQuery, Bootstrap, PHP, HTML, HTML5, CSS, CSS3, XML, JSON,  REST, SOAP
   - Experience in database design and MySQL/Relational databases, data analysis & modeling
   - Experience with or basic understanding of back-end development a plus
   - Working Experience in Radius (Authentication, Authorization, Attributes, CoA, Accounting, etc) , and Free Radius - understanding the internals.
   - Working Experience Network Device AAA (Experience with AAA on different switches, WLAN Controllers, Wireless Access Point, VPN concentrators, integration with Radius solutions)
   - Working Experience in Captive Portal (Redirects, Logins, Walled Garden) - understanding the internals.
   - Knowledge Wi-Fi Standards includes 802.1x(EAP-SIM, EAP-AKA), 802.11(Open, WISPr, WEB Auth etc), HotSpot 2.0 
   - Experience with a version control system (Git a plus)
   - Experience building on cloud platforms such as AWS, etc.
   - Basic knowledge in Photoshop, Illustrator
  softskills:
   - The position requires constant communication with colleagues,
   - Outstanding attention to detail and a strong sense of ownership
   - Demonstrated ability to handle multiple projects simultaneously, meet deadlines, while effectively managing priorities and communicating progress
   - Proven ability to develop and maintain strong professional relationships with clients, colleagues and vendors
   - Prior experience in mobile app development is an asset, not a requirement
   - You are comfortable working in a startup environment and building version 1.0 product from scratch
  cta: Please e-mail your resume in Word/PDF to <a href="mailto:murat@buwifi.com?subject=Python Developer and WiFi Radius-AAA Engineer">murat@buwifi.com</a>. We appreciate every applicant’s interest, but only those under consideration will be contacted.

