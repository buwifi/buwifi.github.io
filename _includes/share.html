<div class="col-md-2 d-none d-md-block">
    <ul class="list-unstyled text-center sticky-bar social-icon mb-0">
        <li class="mb-3 h6">Share</li>
        <!-- <li><a href="javascript:void(0)" class="rounded"><i data-feather="facebook" class="fea icon-sm fea-social"></i></a></li> -->
        <!-- <li><a href="javascript:void(0)" class="rounded"><i data-feather="instagram" class="fea icon-sm fea-social"></i></a></li> -->
        <li>
            <a href="https://twitter.com/intent/tweet?
            text={{ page.title }}
            &url={{ site.url }}{{site.baseurl}}{{ page.url }}
            &via={{ site.twitter_username }}&related={{ site.twitter_username }}" 
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            rel="nofollow" 
            target="_blank" 
            title="Share on Twitter"
            class="rounded">
            <i data-feather="twitter" class="fea icon-sm fea-social"></i>
            </a>
        </li>
        
        <li>
            <a href="https://www.linkedin.com/shareArticle?mini=true
            &url={{ site.url }}{{site.baseurl}}{{ page.url }}
            &title={{ page.title }}
            &summary={{ page.description }}
            &source=buwifi" 
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on LinkedIn"
            class="rounded">
            <i data-feather="linkedin" class="fea icon-sm fea-social"></i>
            </a>
        </li>

        <li>
            <a href="mailto:?subject={{ page.title }}&amp;body=Check out this site {{ site.url }}{{ site.baseurl }}{{ page.url }}" 
            title="Share via Email"
            class="rounded">
            <i data-feather="mail" class="fea icon-sm fea-social"></i>
            </a>
        </li>
    </ul>
</div>
