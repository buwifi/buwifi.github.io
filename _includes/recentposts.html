<div class="widget mb-4 pb-2">
    <h5 class="widget-title">Recent Posts</h5>
    <div class="mt-4">
        {% for post in site.posts limit:3 %}
                <div class="clearfix post-recent">
                    <div class="post-recent-thumb float-start">
                        <a href="{{ site.baseurl }}{{ post.url }}"> 
                            <img alt="img" src="{{ post.heroimage | relative_url }}" class="img-fluid rounded"></a>
                        </div>
                    <div class="post-recent-content float-start">
                        <a href="{{ site.baseurl }}{{ post.url }}">{{post.title}}</a><span class="text-muted mt-2">{{ post.date | date: "%B %d, %Y"}}</span>
                    </div>
                </div>
        {% endfor %}
    </div>
</div>
