howitworks:
  - step: 1. CONNECT 
    header: Connect with visitors the moment they enter the venue
    text: Paige connects to the free WiFi on her mobile phone. BuWiFi identifies and moves Paige from an anonymous visitor to a connected visitor.
          BuWiFi will automatically identify Paige every time she walks into the venue in the future.
    image:
  - step: 2. KNOW
    header: Know more about the visitors as they move around the venue
    text: Once Paige is connected, BuWiFi starts gathering insights based on Paige’s past and present location behavior at the venue.
          The data gathered from Paige’s visits leads to visitor at location personas and Paige is recognized as a “frequent shopper” based on historic venue behavior patterns.
    image:
  - step: 3. ENGAGE
    header: Deliver contextual experiences based on personas at the right time, right place, and right channel
    text: Using WiFi for reach, engage real-time with visitors at the venue. 
          Use SMS, Email, App, Smart Captive Portals to directly engage using BuWiFi or make use of API services to trigger your enterprise workflows with visitors presence intelligence.
          Upon Paige’s 3rd visit, she gets an engagement (a SMS with an offer) “Hey Paige, get 15% off on travel guides at the Airport Gift Shop”.
    image:
  - step: 4. INTEGRATE
    header: Enable a truly integrated traveler journey across digital and physical
    text: Make use of API services to trigger your enterprise workflows with visitors' presence intelligence. 
          Get daily and weekly email updates with trends, reports and analytics on location insights across your venue.
    image:

# A robust location intelligence strategy for your venue starts with BuWiFi
strategy:
  - step: LOCATION HIERARCHY
    header: Have a single, centralized view across all locations that is automatically in sync with your network hierarchy. 
            Any change in the location or configuration of the access points will be automatically reflected on the dashboard. 
            Location insights can be managed from any level in the hierarchy.
    image:
  - step: LOCATION PERSONAS
    header: Easily identify different types of visitors by creating tags based on their location and behavior trends in your venue. 
            Create personalized experiences for different types of at location visitor personas.
    image:
  - step: LOCATION INSIGHTS
    header: Gain meaningful insights by measuring metrics such as dwell time, visits and frequency, zones visited, etc. by location and persona. 
            Monitor trends and predict behavior.
            Quantify the impact of location activity on at-location behavior and transform location insights into business outcomes.
    image:
  - step: SMART MULTI-CHANNEL ENGAGEMENTS
    header: Engage with customers through multiple channels (SMS, Email, Native App, Captive Portal) leveraging smart location hierarchy and personas to drive real-time contextual engagements.
    image:
  - step: SMART CAPTIVE PORTALS
    header: Deliver personalized engagements to customers based on their location, time, persona, relevancy and context using Smart Captive Portals.
    image:


