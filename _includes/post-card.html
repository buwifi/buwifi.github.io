<div class="col-lg-6 col-md-12 mb-4 pb-2">
    <div class="card blog rounded border-0 shadow">
        <div class="position-relative">
            <img src="{{ include.post.heroimage | relative_url }}" class="card-img-top rounded-top" alt="{{ include.post.title }}">
            <div class="overlay rounded-top bg-dark"></div>
        </div>
        <div class="card-body content">
            <h5>
                <a href="{{ include.post.url | relative_url }}" class="card-title title text-dark">

                    {{ include.post.title }}
                </a>
            </h5>
            <div class="post-meta d-flex justify-content-between mt-3">
                <ul class="list-unstyled mb-0">
                    <li class="list-inline-item me-2 mb-0">
                        <i class="mdi mdi-tag text-muted like me-1"></i>
                        {% assign categories = include.post.categories %}
                        {% for category in categories %}
                            <a href="{{ site.baseurl }}/categories/{{ category | slugize }}" class="text-muted like">{{ category }}</a>
                            {% unless forloop.last %}, {% endunless %}
                        {% endfor %}
                    </li>
                </ul>
                <a href="{{ include.post.url | relative_url }}" class="text-muted readmore">
                    Read More <i class="uil uil-angle-right-b align-middle"></i>
                </a>
            </div>
        </div>
        <div class="author">
            <small class="text-light user d-block">
                <i class="uil uil-user"></i> {{ include.post.author }}
            </small>
            <small class="text-light date">
                <i class="uil uil-calendar-alt"></i> {{ include.post.date | date: "%B %d, %Y" }}
            </small>
        </div>
    </div>
</div>
