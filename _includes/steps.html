<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                <div class="section-title mb-4 pb-2">
                    <h4 class="title mb-4">Imagine if your venue is digitized</h4>
                    <p class="text-muted para-desc mx-auto mb-0">Customer experience will never be the same again</p>
                </div>
            </div>
        </div>

        <div class="row">

            {% for item in site.data.master.steps %}
            <div class="col-md-3 mt-4 pt-2">
                <div class="card work-process border-0 rounded shadow">
                    <div class="card-body">
                        <h4 class="title">{{ item.title }}</h4>
                        <p class="text-muted para">{{ item.text }}</p>
                        <a href="{{ site.url }}{{ site.baseurl }}{{ item.url }}" class="text-primary">Read more <i class="uil uil-angle-right-b"></i></a>
                        <ul class="list-unstyled d-flex justify-content-between mb-0 mt-2">
                            <li class="step h1 mb-0 fw-bold">Step 0{{ forloop.index }}.</li>
                            <li class="step-icon"><i class="uil uil-angle-double-right h1 mb-0"></i></li>
                        </ul>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</section>
