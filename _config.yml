# ----------------------------
# SITE META
# ----------------------------
title: "BuWiFi: WiFi Marketing Solution"
description: >
  BuWiFi - WiFi Marketing Solution. Understand Your Customers and Engage Better.
  Transform your guest WiFi into a powerful WiFi marketing tool.
web: https://buwifi.com
keywords: Guest WiFi, Analytics, Personalization, WiFi Marketing, CDP, CRM
name: BuWiFi
product_name: BuWiFi
author: Murat Eren
email: info@buwifi.com
address: "Yoğurtçubaşı Sok. No 18/1 D13, Kadıköy, 34726, İstanbul, Türkiye"
phone: "+90 (532) 170 3160"
logo: images/BuWiFi-logo-black.svg
logowhite: images/BuWiFi-logo-white.svg
favicon: images/BuWiFi.ico
blogimage: images/company/busy-hands-typing.jpg
twitter: "https://www.twitter.com/buwifi/"
twitter_username: buwifi
linkedin: "https://www.linkedin.com/company/buwifi/"
instagram: "https://www.instagram.com/buwifi/"
telephone: "+905321703160"
jdlocation: "https://maps.google.com/maps?q=Fenerbah%C3%A7e,%20Yo%C4%9Furt%C3%A7uba%C5%9F%C4%B1%20Sokak%2018-1,%20Kad%C4%B1k%C3%B6y/%C4%B0stanbul&t=&z=13&ie=UTF8&iwloc=&output=embed"
og_image: images/company/wifi-shopping-mall.jpg

google_analytics: G-CQBBWRN64F
debug: true

# ----------------------------
# URL & BASEURL
# ----------------------------
url: "https://buwifi.github.io"  # or your custom domain
baseurl: ""                     # leave blank for root

# ----------------------------
# SASS/SCSS
# ----------------------------
sass:
  style_dir: _scss
  sass_dir: _scss
  style: :expanded

# ----------------------------
# MARKDOWN
# ----------------------------
markdown: kramdown

# ----------------------------
# PLUGINS
# ----------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll-sass-converter

# ----------------------------
# COLLECTIONS
# ----------------------------
collections:
  services:
    output: true
    order:
      - guestwifi.md
      - analytics.md
      - communication.md
      - cdp.md
      - dataintegration.md
      - networkmanagement.md
      - speedtest.md
  industry:
    output: true
    order:
      - shoppingmall.md
      - retailchain.md
      - restaurant.md
      - hospitality.md
      - venues.md
      - transportation.md
  jobs:
    output: true
    order:
      - pythondeveloper.md
      - radiusengineer.md
      - frontend.md
  customers:
    output: true
    order:
      - teknosa.md
      - emaar.md

# ----------------------------
# PAGINATION (jekyll-paginate-v2)
# ----------------------------
pagination:
  enabled: true
  per_page: 4
  title: ":title - page :num"
  permalink: "/blog/page:num/"
  sort_field: "date"
  sort_reverse: true
  collection: "posts"

  # Category pagination
  categories:
    enabled: true
    per_page: 4
    title: "Category: :name - page :num"
    permalink: "/categories/:name/page:num/"

  # Tag pagination
  tags:
    enabled: true
    per_page: 4
    title: "Tag: :name - page :num"
    permalink: "/tags/:name/page:num/"
