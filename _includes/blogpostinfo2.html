<ul class="list-unstyled d-flex justify-content-between mt-2">
    <li class="list-inline-item user me-2"><a href="javascript:void(0)" class="text-muted"><i
                class="uil uil-user text-dark"></i> {{ page.author }}</a></li>
    <li class="list-inline-item date text-muted"><i class="uil uil-calendar-alt text-dark"></i>
        {{ page.date | date: "%B %d, %Y"}}</li>
    <ul class="list-unstyled">
        <li class="list-inline-item me-2"><span class="text-muted">Share Now </span></li>

            <li class="list-inline-item"><a href="{{ site.instagram }}" class="rounded"><i data-feather="instagram" class="fea icon-sm fea-social"></i></a></li>
            <li class="list-inline-item"><a href="{{ site.twitter }}" class="rounded"><i data-feather="twitter" class="fea icon-sm fea-social"></i></a></li>
            <li class="list-inline-item"><a href="{{ site.linkedin }}" class="rounded"><i data-feather="linkedin" class="fea icon-sm fea-social"></i></a></li>




        <li class="list-inline-item me-2">
            <a href="https://twitter.com/intent/tweet?
                text={{ page.title }}
                &url={{ site.url }}{{site.baseurl}}{{ page.url }}
                &via={{ site.twitter_username }}&related={{ site.twitter_username }}"
                onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
                rel="nofollow" target="_blank" title="Share on Twitter" class="rounded">
                <i class="fab fa-twitter"></i>
            </a>
        </li>

        <li class="list-inline-item me-2">
            <a href="#">
                <a href="https://www.linkedin.com/shareArticle?mini=true
                &url={{ site.url }}{{site.baseurl}}{{ page.url }}
                &title={{ page.title }}
                &summary={{ page.description }}
                &source=buwifi"
                    onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
                    title="Share on LinkedIn" class="rounded">
                    <i class="fab fa-linkedin"></i>
                </a>
        </li>
        <li class="list-inline-item me-2">
            <a href="mailto:?subject={{ page.title }}&amp;body=Check out this site {{ site.url }}{{ site.baseurl }}{{ page.url }}"
                title="Share via Email" class="rounded">
                <i class="fas fa-envelope"></i>
            </a>
        </li>
    </ul>
</ul>
