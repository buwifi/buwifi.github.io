<!-- <section class="vh-100 d-flex align-items-center" style="background: url('images/contact-detail.jpg') center center;"> -->
<section class="vh-100 d-flex align-items-center" center center;>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 col-md-6 order-1 order-md-2">
                <div class="card border-0">
                    <div class="card-body p-0">
                        <img src="images/contact.svg" class="img-fluid" alt="">
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-6 order-1 order-md-2">
                <!-- <div class="title-heading mt-5 pt-4"> -->
                <div>
                    <h1 class="heading">Let's talk to create game-changing experiences for your customers</h1>
                    <p class="text-dark"><span class="text-primary fw-bold">BuWiFi</span> will help you deliver personalized customer experiences.</p>

                    <div class="d-flex contact-detail align-items-center mt-3">
                        <div class="icon">
                            <i data-feather="mail" class="fea icon-m-md text-dark me-3"></i>
                        </div>
                        <div class="flex-1 content">
                            <h5 class="title fw-bold mb-0">Email</h5>
                            <a href="mailto:{{site.email}}" class="text-primary">{{site.email}}</a>
                        </div>
                    </div>

                    <div class="d-flex contact-detail align-items-center mt-3">
                        <div class="icon">
                            <i data-feather="phone" class="fea icon-m-md text-dark me-3"></i>
                        </div>
                        <div class="flex-1 content">
                            <h5 class="title fw-bold mb-0">Phone</h5>
                            <a href="tel:{{site.phone}}" class="text-primary">{{site.phone}}</a>
                        </div>
                    </div>

                    <div class="d-flex contact-detail align-items-center mt-3">
                        <div class="icon">
                            <i data-feather="map-pin" class="fea icon-m-md text-dark me-3"></i>
                        </div>
                        <div class="flex-1 content">
                            <h5 class="title fw-bold mb-0">Address</h5>
                            <p class="text-dark">{{site.address}}<br>
                            <a href="https://maps.google.com/maps?q=Fenerbah%C3%A7e,%20Yo%C4%9Furt%C3%A7uba%C5%9F%C4%B1%20Sokak%2018-1,%20Kad%C4%B1k%C3%B6y/%C4%B0stanbul&t=&z=13&ie=UTF8&iwloc=&output=embed"
                                data-type="iframe" class="video-play-icon text-primary lightbox">View on Google map</a>
                        </div>
                    </div>
                    <ul class="list-unstyled social-icon mb-0 mt-4">
                        <li class="list-inline-item"><a href="{{ site.instagram }}" class="rounded"><i data-feather="instagram" class="fea icon-sm fea-social"></i></a></li>
                        <li class="list-inline-item"><a href="{{ site.twitter }}" class="rounded"><i data-feather="twitter" class="fea icon-sm fea-social"></i></a></li>
                        <li class="list-inline-item"><a href="{{ site.linkedin }}" class="rounded"><i data-feather="linkedin" class="fea icon-sm fea-social"></i></a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
