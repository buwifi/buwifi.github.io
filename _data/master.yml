partners:
    title: Technology Partners
    header: Partners for WiFi infrastructure
    text: BuWiFi seamlessly integrates with the majority of WiFi network hardware from the following manufacturers.
    image: images/saas/classic01.png
    logos:
      - images/company/partners/cisco-meraki-logo.svg
      - images/company/partners/Cisco_logo.svg
      - images/company/partners/aruba-networks-logo.svg
      - images/company/partners/Tp-link-logo.svg
      - images/company/partners/Fortinet-Logo.svg
    questions:
      title: You have any questions ?
      text: Here you'll find answers to the questions we get asked the most about BuWiFi.
      list:
        - BuWiFi is cloud-based and it is an overlay to your existing WiFi infrastructure, so no extra hardware is required
        - Cloud-based
        - Mobile application is not required
        - Uses existing in-store WiFi network
        - GDPR and KVKK compliant
        - Fancy a demo? Contact us and one of our product experts will be in touch.
    faq:
      - question: What is WiFi Marketing?
        answer: > 
                  WiFi marketing is an innovative way for brick-and-mortar businesses 
                  to build customer loyalty by leveraging on-premise guest WiFi 
                  to run highly targeted digital ads, send emails & SMS messages, 
                  and automate other customer communications.
      - question: How does it work?
        answer: > 
                  BuWiFi is a cloud-based WiFi platform and it is an overlay to your existing WiFi infrastructure, so no extra hardware is required. 
                  Setup is seriously quick and everything is managed via an online portal.
                  When visitors connect to WiFi, our captive portal compliantly captures key contact and demographic information which allows you to get to know your visitors, quickly analyze data, and follow up with personalized marketing campaigns.
      - question: Does it require an app?
        answer: BuWiFi doesn't require an app since engagement is done over SMS or email. But BuWiFi can communicate with an app and increase its effectiveness.
      - question: Do I need to install any additional hardware?
        answer: >
                  No. BuWiFi is a cloud-based WiFi platform and it is an overlay to your existing WiFi infrastructure, so no extra hardware is required. 
      - question: Any integration capabilities?
        answer: Yes. Using Webhooks and APIs.
      - question: How BuWiFi is deployed?
        answer: When wireless infrastructure is ready, BuWiFi setup is very quick and everything is managed via an online portal.
      - question: Is BuWiFi compliant with privacy regulations?
        answer: Yes. BuWiFi is a secure & compliant with the various regulations. It is compliant with General Data Protection Regulation (GDPR) and 
                6698 KVKK (Kişisel Verilerin Korunması Kanunu) (Law on the Protection of Personal Data).
                When we provide guest WiFi, the terms and conditions clearly defines what data are we collecting and why.
                Guests will have to opt-in to any marketing material. Clear instructions on how to opt-out is also provided. 
      - question: How can I test BuWiFi?
        answer: We provide 1 month Proof of Concept (PoC) to our potential customers. Fully enabled solution is installed to chosen locations. 
                Splash and Langing pages are customized. After PoC, a report is provided to go over the insights.

