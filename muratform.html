<!DOCTYPE html>
<html>
<head>
    <title>Send an Email</title>
</head>
<body>

	<center>
		<h4 class="sent-notification"></h4>

		<form id="myForm">
			<h2>Send an Email</h2>
			<label>Name</label><input id="name" type="text" placeholder="Enter Name"><br>
			<label>Email</label><input id="email" type="text" placeholder="Enter Email"><br>
			<label>Subject</label><input id="subject" type="text" placeholder=" Enter Subject"><br>
			<p>Message</p><textarea id="message" rows="5" placeholder="Type Message"></textarea><br>
			<button type="button" onclick="sendEmail()" value="Send An Email">Submit</button> 
		</form>
	</center>

	<script src="http://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="js/myform.js"></script>
</body>
</html>
