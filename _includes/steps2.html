<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                <div class="section-title mb-4 pb-2">
                    <h4 class="title mb-4">Imagine if your venue can be digitized</h4>
                    <p class="text-muted para-desc mb-0 mx-auto">Customer experience will never be same again</p>
                </div>
            </div>
        </div>

        <div class="row align-items-center">

            {% for item in site.data.master.steps %}

            <div class="col-md-3 col-12 mt-4 pt-2">
                <div class="card pricing-rates best-plan rounded bg-light text-center border-0">
                    <div class="card-body py-5">
                        <img src="{{ item.svg }}" class="mb-4" height="50" alt="">
                        <h5 class="title text-uppercase mb-4">{{ item.title }}</h5>
                        <p class="text-muted">{{ item.text }}</p>
                        <a href="{{ item.url }}" class="btn btn-outline-primary btn-sm mt-4">Read More</a>
                    </div>
                </div>
            </div>

            {% endfor %}


        </div>
        <!--end row-->
    </div>
</section>
