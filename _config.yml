# ----------------------------
# SASS/SCSS
# ----------------------------
sass:
  style_dir: _scss
  sass_dir: _scss
  style: :expanded

# ----------------------------
# MARKDOWN
# ----------------------------
markdown: kramdown
# ----------------------------
# PLUGINS
# ----------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-sass-converter
  - jekyll-paginate-v2
  - jekyll-archives

# ----------------------------
# Main blog pagination
# ----------------------------
paginate_path: "/blog/page:num/"
pagination:
  enabled: true
  per_page: 4
  sort_field: 'date'
  sort_reverse: true

# ----------------------------
# Jekyll Archives for categories & tags
# ----------------------------

