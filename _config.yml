      - analytics.md
      - communication.md
      - cdp.md
      - dataintegration.md
      - networkmanagement.md
      - speedtest.md
  industry:
    output: true
    order: 
      - shoppingmall.md
      - retailchain.md
      - restaurant.md
      - hospitality.md
      - venues.md
      - transportation.md
  jobs:
    output: true
